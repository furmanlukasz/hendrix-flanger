name: Build Hendrix Flanger

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake
      working-directory: plugin
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

    - name: Build
      working-directory: plugin
      run: cmake --build build --config Release --parallel

    - name: List artifacts
      working-directory: plugin
      run: |
        echo "=== VST3 ===" && find build -name "*.vst3" -type d
        echo "=== AU ===" && find build -name "*.component" -type d

    - name: Package VST3
      working-directory: plugin
      run: |
        mkdir -p artifacts/VST3
        cp -R build/HendrixFlanger_artefacts/Release/VST3/*.vst3 artifacts/VST3/ || true

    - name: Package AU
      working-directory: plugin
      run: |
        mkdir -p artifacts/AU
        cp -R build/HendrixFlanger_artefacts/Release/AU/*.component artifacts/AU/ || true

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: HendrixFlanger-macOS-VST3
        path: plugin/artifacts/VST3/
        if-no-files-found: warn

    - name: Upload AU
      uses: actions/upload-artifact@v4
      with:
        name: HendrixFlanger-macOS-AU
        path: plugin/artifacts/AU/
        if-no-files-found: warn

    - name: Zip macOS VST3 for release
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: plugin/artifacts
      run: zip -r ../../HendrixFlanger-macOS-VST3.zip VST3/

    - name: Zip macOS AU for release
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: plugin/artifacts
      run: zip -r ../../HendrixFlanger-macOS-AU.zip AU/

    - name: Upload release zips
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-macos
        path: |
          HendrixFlanger-macOS-VST3.zip
          HendrixFlanger-macOS-AU.zip

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake
      working-directory: plugin
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      working-directory: plugin
      run: cmake --build build --config Release --parallel

    - name: Package VST3
      working-directory: plugin
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts/VST3
        Copy-Item -Recurse "build/HendrixFlanger_artefacts/Release/VST3/*" "artifacts/VST3/" -ErrorAction SilentlyContinue

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: HendrixFlanger-Windows-VST3
        path: plugin/artifacts/VST3/
        if-no-files-found: warn

    - name: Zip Windows VST3 for release
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: plugin/artifacts
      shell: powershell
      run: Compress-Archive -Path "VST3/*" -DestinationPath "../../HendrixFlanger-Windows-VST3.zip"

    - name: Upload release zip
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-windows
        path: HendrixFlanger-Windows-VST3.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-macos

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-windows

    - name: List release files
      run: ls -la *.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          HendrixFlanger-macOS-VST3.zip
          HendrixFlanger-macOS-AU.zip
          HendrixFlanger-Windows-VST3.zip
